<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fexnox</title>
  <link rel="stylesheet" href="css/normalize.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <header>
    <div class="hero">
      <nav class="navegacion"></nav>

        <div class="title">
            <h1>Fexnox</h1>
             <p class="subtitle">Periféricos diseñados para dominar tu setup</p>
        </div>


      <div class="luna">
        <img src="img/luna.png" alt="Luna" />
      </div>

      <div class="imagen-samurai">
        <img src="img/samurai.png" alt="Samurai" />
      </div>
    </div>
  </header>
<div class="cards-color">
  <main class="cards">
    
        <a class="card card--wide" href="#">
            <h3 class="card__title">MOUSEPADS</h3>
            <img class="card__img" src="img/mousepad.png" alt="Mousepads" />
        </a>

        <a class="card card--wide card-teclados" href="#">
             <h3 class="card__title">TECLADOS</h3>
             <img class="card__img card__img--right" src="img/teclados.png" alt="Teclados" />
        </a>

        <a class="card" href="#">
             <h3 class="card__title">KEYCAPS</h3>
            <img class="card__img" src="img/keycaps.png" alt="Keycaps" />
        </a>

        <a class="card  card-straps" href="#">
             <h3 class="card__title">STRAPS</h3>
             <img class="card__img card__img--bottom-right" src="img/strap.png" alt="Straps" />
        </a>

        <a class="card" href="#">
             <h3 class="card__title">KEYCAPS</h3>
             <img class="card__img" src="img/keycaps.png" alt="Keycaps" />
        </a>
    </div>
  </main>
  </div>
</body>
</html>
